<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">

  <!-- Chart background panel -->
  <rect x="30" y="40" width="200" height="160" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Chart grid lines -->
  <line x1="50" y1="80" x2="210" y2="80" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="110" x2="210" y2="110" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="140" x2="210" y2="140" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="170" x2="210" y2="170" stroke="#333" stroke-width="1"/>
  <!-- Falling red chart line -->
  <polyline points="55,75 90,88 120,100 150,125 175,150 200,170 215,185"
            fill="none" stroke="#ff2222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red arrow tip at bottom -->
  <polygon points="215,185 205,175 225,175" fill="#ff2222"/>
  <!-- Chart label -->
  <text x="120" y="60" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" fill="#666">$UP CHART</text>

  <!-- ── PEPE BODY ── -->

  <!-- Legs / pants (brown) -->
  <ellipse cx="210" cy="390" rx="38" ry="28" fill="#8B6545"/>
  <rect x="175" y="330" width="75" height="65" rx="10" fill="#8B6545"/>

  <!-- Feet -->
  <ellipse cx="185" cy="408" rx="22" ry="10" fill="#5D7A2A"/>
  <ellipse cx="235" cy="408" rx="22" ry="10" fill="#5D7A2A"/>

  <!-- Blue sweater body -->
  <ellipse cx="210" cy="300" rx="70" ry="75" fill="#3A6FD8"/>
  <rect x="140" y="260" width="140" height="80" rx="12" fill="#3A6FD8"/>

  <!-- Left arm reaching down toward chart arrow -->
  <path d="M148,280 Q90,310 80,360 Q75,375 88,378 Q100,380 105,365 Q112,340 158,305 Z"
        fill="#3A6FD8" stroke="#2a5bc0" stroke-width="1.5"/>
  <!-- Left hand (green) pushing up the arrow -->
  <ellipse cx="86" cy="370" rx="16" ry="13" fill="#5D8A2E"/>
  <ellipse cx="74" cy="365" rx="10" ry="8" fill="#5D8A2E"/>
  <ellipse cx="78" cy="380" rx="9" ry="7" fill="#5D8A2E"/>

  <!-- Right arm up/open -->
  <path d="M270,275 Q320,250 340,230 Q350,220 345,210 Q338,200 328,208 Q310,225 268,260 Z"
        fill="#3A6FD8" stroke="#2a5bc0" stroke-width="1.5"/>
  <!-- Right hand -->
  <ellipse cx="338" cy="213" rx="15" ry="13" fill="#5D8A2E"/>
  <ellipse cx="350" cy="207" rx="9" ry="7" fill="#5D8A2E"/>
  <ellipse cx="348" cy="221" rx="9" ry="7" fill="#5D8A2E"/>

  <!-- Neck -->
  <rect x="188" y="218" width="45" height="30" rx="6" fill="#5D8A2E"/>

  <!-- HEAD -->
  <ellipse cx="210" cy="185" rx="82" ry="75" fill="#5D8A2E"/>

  <!-- Head top bumps -->
  <ellipse cx="175" cy="122" rx="28" ry="22" fill="#5D8A2E"/>
  <ellipse cx="210" cy="115" rx="30" ry="22" fill="#5D8A2E"/>
  <ellipse cx="245" cy="122" rx="28" ry="22" fill="#5D8A2E"/>

  <!-- Face bottom (lighter) -->
  <ellipse cx="210" cy="210" rx="60" ry="45" fill="#88AA44"/>

  <!-- Eyes white -->
  <ellipse cx="180" cy="168" rx="26" ry="24" fill="white"/>
  <ellipse cx="240" cy="168" rx="26" ry="24" fill="white"/>

  <!-- Pupils -->
  <circle cx="183" cy="170" r="13" fill="#111"/>
  <circle cx="237" cy="170" r="13" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="188" cy="163" r="5" fill="white"/>
  <circle cx="242" cy="163" r="5" fill="white"/>

  <!-- Eye outline / brow stress lines -->
  <path d="M157,150 Q180,138 203,148" fill="none" stroke="#3a6010" stroke-width="3" stroke-linecap="round"/>
  <path d="M217,148 Q240,138 263,150" fill="none" stroke="#3a6010" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="210" cy="200" rx="22" ry="10" fill="#7A6030"/>
  <circle cx="200" cy="199" r="5" fill="#5a4020"/>
  <circle cx="220" cy="199" r="5" fill="#5a4020"/>

  <!-- Mouth open / screaming -->
  <path d="M185,222 Q210,250 235,222" fill="#1a0800" stroke="#3a2010" stroke-width="2"/>
  <ellipse cx="210" cy="232" rx="18" ry="10" fill="#cc3333"/>
  <!-- Teeth -->
  <rect x="196" y="222" width="11" height="8" rx="2" fill="white"/>
  <rect x="210" y="222" width="11" height="8" rx="2" fill="white"/>

  <!-- Head outline -->
  <ellipse cx="210" cy="185" rx="82" ry="75" fill="none" stroke="#3a6010" stroke-width="2.5"/>

  <!-- SPEECH BUBBLE -->
  <ellipse cx="330" cy="100" rx="58" ry="40" fill="white" stroke="#111" stroke-width="3"/>
  <!-- Bubble tail pointing to mouth -->
  <polygon points="285,125 275,155 300,130" fill="white" stroke="#111" stroke-width="2.5"/>
  <!-- "UP!" text -->
  <text x="330" y="93" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
        font-size="28" font-weight="900" fill="#111" letter-spacing="1">UP!</text>
  <text x="330" y="118" text-anchor="middle" font-family="Arial Black,Impact,sans-serif"
        font-size="13" font-weight="900" fill="#cc2222">↑ PLS</text>

</svg>
